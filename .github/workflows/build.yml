name: Build Plugin

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # 必须

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - name: Build
      run: ./gradlew build

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: CustomNameplates
        path: "**/build/libs/*.jar"
