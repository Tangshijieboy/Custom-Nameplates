name: Build Custom-Nameplates

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    name: Build Bukkit Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build Bukkit plugin only
        run: ./gradlew :platforms:bukkit:build --no-daemon

      - name: Upload Bukkit plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Custom-Nameplates
          path: platforms/bukkit/build/libs/*bukkit*.jar
